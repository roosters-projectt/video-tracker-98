<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roobet Clips · Tracker</title>
<style>
:root {
  --bg:#0a0a0a; --card:#111; --card2:#161616; --border:#222; --border2:#2e2e2e;
  --text:#f0f0f0; --muted:#555; --muted2:#888;
  --accent:#00c896; --purple:#8b7cf8; --blue:#4a9ef8;
  --amber:#f5a623; --bronze:#cd7f32; --red:#ff5252;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;}
.app{max-width:920px;margin:0 auto;padding:24px 16px 80px;}

/* Header */
.header{margin-bottom:20px;}
.header h1{font-size:21px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:8px;}
.header-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.header-meta span{font-size:12px;color:var(--muted2);}
.hl{color:var(--text)!important;font-weight:500;}
.days-pill{font-size:12px;padding:3px 10px;border-radius:20px;background:#1a1a1a;border:1px solid var(--border);}
.days-urgent{border-color:var(--red)!important;color:var(--red)!important;}

/* Sync */
.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;padding:7px 13px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted2);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sync-dot.ok{background:var(--accent);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Top actions */
.top-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.btn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;padding:7px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn:active{transform:scale(.97);}
.btn.danger:hover{border-color:var(--red);color:var(--red);}
.btn.primary{border-color:var(--accent);color:var(--accent);}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:24px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:700;color:var(--accent);}

/* Cards */
.cards{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 17px;transition:border-color .2s;}
.card:hover{border-color:#2e2e2e;}
.card.urgent{border-color:#3d1500;}
.card.urgent .pbar-bg{background:#1e0a00;}

.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px;}
.card-left{display:flex;align-items:center;gap:9px;}
.acc-name{font-size:15px;font-weight:600;}
.tier-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.priority-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:#3d0000;color:var(--red);border:1px solid #5a0000;font-weight:600;}
.rate-tag{font-size:11px;color:var(--muted2);background:#1a1a1a;border:1px solid var(--border);padding:3px 8px;border-radius:6px;}

.card-stats{display:flex;gap:20px;margin-bottom:11px;flex-wrap:wrap;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:1px;}
.stat-val{font-size:19px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--muted);}

.progress-wrap{margin-bottom:9px;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.progress-label{font-size:11px;color:var(--muted);}
.progress-pct{font-size:12px;font-weight:700;}
.pbar-bg{height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}

.card-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;}
.next-info{font-size:12px;color:var(--muted2);}
.next-info span{font-weight:600;}
.next-info .ok{color:var(--accent);}
.per-day{font-size:12px;font-weight:600;color:var(--amber);background:#1e1800;border:1px solid #3d3000;padding:3px 10px;border-radius:6px;}
.per-day.done{color:var(--accent);background:#002a1e;border-color:#005040;}
.per-day.urgent{color:var(--red);background:#1e0500;border-color:#5a1500;}

.input-row{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);}
.input-row label{font-size:12px;color:var(--muted);white-space:nowrap;}
.vid-input{width:76px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:14px;font-weight:600;padding:5px 9px;text-align:center;outline:none;}
.vid-input:focus{border-color:var(--accent);}
.save-btn{background:transparent;border:1px solid #333;border-radius:8px;color:var(--text);font-size:12px;padding:5px 13px;cursor:pointer;transition:all .15s;}
.save-btn:hover{border-color:var(--accent);color:var(--accent);}
.save-btn:disabled{opacity:.4;cursor:not-allowed;}
.saved-msg{font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;}
.saved-msg.show{opacity:1;}
.card-actions{margin-left:auto;display:flex;gap:6px;}
.icon-btn{background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 6px;border-radius:5px;transition:color .15s;}
.icon-btn:hover{color:var(--red);}

/* Tier colors */
.tb-bronze{background:#2a1500;color:var(--bronze);border:1px solid #3d2000;}
.tb-silver{background:#1a1a1a;color:#a8a8a8;border:1px solid #333;}
.tb-gold{background:#2a1800;color:var(--amber);border:1px solid #3d2800;}
.tb-diamond{background:#001a3d;color:var(--blue);border:1px solid #003070;}
.tb-master{background:#1a0050;color:var(--purple);border:1px solid #2a0080;}
.tb-above{background:#002a1e;color:var(--accent);border:1px solid #005040;}
.pf-bronze{background:var(--bronze);}
.pf-silver{background:#a8a8a8;}
.pf-gold{background:var(--amber);}
.pf-diamond{background:var(--blue);}
.pf-master{background:var(--purple);}
.pf-above{background:var(--accent);}
.pc-bronze{color:var(--bronze);}
.pc-silver{color:#a8a8a8;}
.pc-gold{color:var(--amber);}
.pc-diamond{color:var(--blue);}
.pc-master{color:var(--purple);}
.pc-above{color:var(--accent);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#161616;border:1px solid var(--border2);border-radius:14px;padding:24px;width:100%;max-width:420px;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text);}
.modal-field{margin-bottom:13px;}
.modal-field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:5px;}
.modal-field input,.modal-field select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:14px;padding:8px 11px;outline:none;}
.modal-field input:focus,.modal-field select:focus{border-color:var(--accent);}
.modal-field select option{background:#1a1a1a;}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.modal-actions .btn{font-size:13px;padding:8px 18px;}

/* Confirm modal */
.confirm-modal{background:#161616;border:1px solid #3d1500;border-radius:14px;padding:24px;width:100%;max-width:360px;text-align:center;}
.confirm-modal h3{font-size:15px;margin-bottom:10px;}
.confirm-modal p{font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.6;}

.page-footer{text-align:center;margin-top:40px;font-size:11px;color:#2a2a2a;}
@media(max-width:500px){.kpi-val{font-size:17px;}.acc-name{font-size:14px;}.card-stats{gap:14px;}.stat-val{font-size:16px;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ROOBET CLIPS · ACCOUNT TRACKER</h1>
    <div class="header-meta">
      <span id="cycle-month" class="hl"></span>
      <span id="cycle-days" class="days-pill"></span>
      <span id="cycle-close"></span>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-msg">Conectando...</span>
  </div>

  <div class="top-actions">
    <button class="btn primary" onclick="openAddModal()">+ Agregar cuenta</button>
    <button class="btn danger" onclick="openResetModal()">↺ Nuevo ciclo</button>
  </div>

  <div class="kpi-row" id="kpi-row"></div>
  <div class="cards" id="cards"></div>
  <div class="page-footer">Roobet Clips Tracker · sincronizado en todos tus dispositivos</div>
</div>

<!-- Add/Edit account modal -->
<div class="modal-overlay" id="acc-modal">
  <div class="modal">
    <h3 id="modal-title">Agregar cuenta</h3>
    <div class="modal-field">
      <label>Nombre de la cuenta</label>
      <input type="text" id="modal-name" placeholder="Ej: Yoshua" />
    </div>
    <div class="modal-field">
      <label>Tier actual</label>
      <select id="modal-tier">
        <option>Bronze</option>
        <option>Silver</option>
        <option>Gold</option>
        <option>Diamond</option>
        <option selected>Master</option>
        <option>Above All</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('acc-modal')">Cancelar</button>
      <button class="btn primary" id="modal-save-btn" onclick="saveAccount()">Guardar</button>
    </div>
  </div>
</div>

<!-- Reset confirm modal -->
<div class="modal-overlay" id="reset-modal">
  <div class="confirm-modal">
    <h3>¿Nuevo ciclo?</h3>
    <p>Esto va a resetear los videos de todas las cuentas a 0.<br/>Los datos del ciclo actual se van a perder.</p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn" onclick="closeModal('reset-modal')">Cancelar</button>
      <button class="btn danger" onclick="confirmReset()">Sí, nuevo ciclo</button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="confirm-modal">
    <h3 id="delete-title">¿Eliminar cuenta?</h3>
    <p id="delete-msg">Esta acción no se puede deshacer.</p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn" onclick="closeModal('delete-modal')">Cancelar</button>
      <button class="btn danger" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uycscbjbtutzlhzyguvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Y3NjYmpidHV0emxoenlndXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTY4MDIsImV4cCI6MjA5NDk3MjgwMn0.8aovsUXrQchbce5xlsKH9f0iVXILlW3WuWhgM5iJzC4';
const VTABLE = 'Videos';
const ATABLE = 'accounts';

const TIERS = {
  'Bronze':    {rate:1500,goal:30, next:'Silver',   cls:'bronze'},
  'Silver':    {rate:1550,goal:40, next:'Gold',     cls:'silver'},
  'Gold':      {rate:1600,goal:50, next:'Diamond',  cls:'gold'},
  'Diamond':   {rate:1650,goal:100,next:'Master',   cls:'diamond'},
  'Master':    {rate:1750,goal:250,next:'Above All',cls:'master'},
  'Above All': {rate:2000,goal:250,next:null,       cls:'above'},
};

let accounts = [];
let videoData = {};
let editingAccount = null;
let deletingAccount = null;

const H = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'resolution=merge-duplicates'
};

function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-msg').textContent = msg;
}

async function apiGet(table, query='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {headers: H});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function apiUpsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST', headers: H, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function apiDelete(table, filter) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method:'DELETE', headers: H
  });
  if (!r.ok) throw new Error(await r.text());
}

async function init() {
  setSyncStatus('loading', 'Cargando datos...');
  try {
    await ensureAccountsTable();
    const [accs, vids] = await Promise.all([
      apiGet(ATABLE, 'select=name,tier&order=sort_order.asc'),
      apiGet(VTABLE, 'select=account,count')
    ]);

    if (accs.length === 0) {
      await seedDefaultAccounts();
      accounts = (await apiGet(ATABLE, 'select=name,tier&order=sort_order.asc'));
    } else {
      accounts = accs;
    }

    videoData = {};
    vids.forEach(r => { videoData[r.account] = r.count; });

    setSyncStatus('ok', 'Conectado · ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    console.error(e);
    setSyncStatus('err', 'Error al conectar: ' + e.message);
  }
}

async function ensureAccountsTable() {
  try {
    await apiGet(ATABLE, 'select=name&limit=1');
  } catch(e) {
    throw new Error('La tabla "accounts" no existe. Créala en Supabase con columnas: name (text), tier (text), sort_order (int4)');
  }
}

async function seedDefaultAccounts() {
  const defaults = [
    {name:'Yoshua',    tier:'Master',  sort_order:1},
    {name:'LAckerman', tier:'Master',  sort_order:2},
    {name:'Manuel',    tier:'Master',  sort_order:3},
    {name:'Annie',     tier:'Master',  sort_order:4},
    {name:'Vergik',    tier:'Bronze',  sort_order:5},
    {name:'Biggie',    tier:'Bronze',  sort_order:6},
    {name:'RoosterB',  tier:'Diamond', sort_order:7},
  ];
  await apiUpsert(ATABLE, defaults);
}

function getDays() {
  const now = new Date();
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const daysLeft = last.getDate() - now.getDate();
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return {
    daysLeft, total: last.getDate(),
    monthName: months[now.getMonth()],
    year: now.getFullYear(),
    closeDate: `${String(last.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`
  };
}

function getPriority(acc) {
  const vids = videoData[acc.name] || 0;
  const goal = TIERS[acc.tier].goal;
  if (vids >= goal) return 999;
  return vids / goal;
}

function render() {
  const {daysLeft, total, monthName, year, closeDate} = getDays();
  document.getElementById('cycle-month').textContent = `${monthName.toUpperCase()} ${year}`;
  const dp = document.getElementById('cycle-days');
  dp.textContent = `${daysLeft} días restantes de ${total}`;
  dp.className = 'days-pill' + (daysLeft <= 5 ? ' days-urgent' : '');
  const cl = document.getElementById('cycle-close');
  cl.textContent = `Ciclo cierra: ${closeDate}`;
  cl.style.cssText = 'color:#444;font-size:12px;';

  const totalVids = accounts.reduce((s,a) => s+(videoData[a.name]||0), 0);
  const masterCount = accounts.filter(a => a.tier==='Master').length;
  const aboveCount = accounts.filter(a => a.tier==='Above All').length;
  const avgRate = accounts.length ? Math.round(accounts.reduce((s,a) => s+TIERS[a.tier].rate, 0)/accounts.length) : 0;
  const readyCount = accounts.filter(a => (videoData[a.name]||0) >= TIERS[a.tier].goal).length;

  document.getElementById('kpi-row').innerHTML = [
    ['Cuentas', accounts.length],
    ['Total videos', totalVids],
    ['En Master', masterCount],
    ['En Above All', aboveCount],
    ['Rate prom.', `$${avgRate.toLocaleString()}`],
    ['Listas', readyCount],
  ].map(([l,v]) => `<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val">${v}</div></div>`).join('');

  const sorted = [...accounts].sort((a,b) => getPriority(a) - getPriority(b));

  document.getElementById('cards').innerHTML = sorted.map((acc, idx) => {
    const td = TIERS[acc.tier];
    const vids = videoData[acc.name] || 0;
    const goal = td.goal;
    const pct = Math.min(100, Math.round((vids/goal)*100));
    const rem = Math.max(0, goal - vids);
    const cls = td.cls;
    const isAbove = acc.tier === 'Above All';
    const done = vids >= goal;
    const needDay = daysLeft > 0 ? Math.ceil(rem/daysLeft) : rem;
    const isUrgent = !done && daysLeft <= 7 && needDay >= 5;
    const dest = isAbove ? 'mantener Above All' : `subir a ${td.next}`;
    const isPriority = !done && idx < 3 && accounts.length > 3;

    return `
    <div class="card${isUrgent ? ' urgent' : ''}">
      <div class="card-head">
        <div class="card-left">
          <span class="acc-name">${acc.name}</span>
          <span class="tier-badge tb-${cls}">${acc.tier}</span>
          ${isPriority ? `<span class="priority-tag">URGENTE</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="rate-tag">$${td.rate.toLocaleString()} / 1M</span>
          <button class="icon-btn" onclick="openEditModal('${acc.name}')" title="Editar">✎</button>
          <button class="icon-btn" onclick="openDeleteModal('${acc.name}')" title="Eliminar">✕</button>
        </div>
      </div>

      <div class="card-stats">
        <div class="stat">
          <div class="stat-label">Videos</div>
          <div class="stat-val">${vids}</div>
          <div class="stat-sub">de ${goal}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Progreso</div>
          <div class="stat-val pc-${cls}">${pct}%</div>
          <div class="stat-sub">${done ? '✓ Meta alcanzada' : `${rem} restantes`}</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span class="progress-label">${isAbove ? 'Retención del tier' : `Hacia ${td.next}`}</span>
          <span class="progress-pct pc-${cls}">${pct}%</span>
        </div>
        <div class="pbar-bg">
          <div class="pbar-fill pf-${cls}" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="card-foot">
        <div class="next-info">
          ${done
            ? `<span class="ok">✓ Listo para ${isAbove ? 'mantener' : td.next}</span>`
            : `Faltan <span>${rem} videos</span> para ${dest}`}
        </div>
        ${done
          ? `<span class="per-day done">✓ Meta</span>`
          : `<span class="per-day${isUrgent ? ' urgent' : ''}">${needDay}/día</span>`}
      </div>

      <div class="input-row">
        <label>Videos:</label>
        <input class="vid-input" type="number" min="0" step="1" value="${vids}" id="inp-${acc.name}" onkeydown="if(event.key==='Enter')updateVids('${acc.name}')" />
        <button class="save-btn" id="btn-${acc.name}" onclick="updateVids('${acc.name}')">Guardar</button>
        <span class="saved-msg" id="msg-${acc.name}">✓ Guardado</span>
      </div>
    </div>`;
  }).join('');
}

async function updateVids(name) {
  const input = document.getElementById('inp-'+name);
  const btn = document.getElementById('btn-'+name);
  const val = Math.max(0, parseInt(input.value)||0);
  btn.disabled = true;
  setSyncStatus('loading', 'Guardando...');
  try {
    await apiUpsert(VTABLE, {account: name, count: val});
    videoData[name] = val;
    setSyncStatus('ok', 'Guardado · ' + new Date().toLocaleTimeString());
    render();
    const msg = document.getElementById('msg-'+name);
    if (msg) { msg.classList.add('show'); setTimeout(()=>msg.classList.remove('show'), 2000); }
  } catch(e) {
    setSyncStatus('err', 'Error al guardar');
    btn.disabled = false;
  }
}

// ── Modals ──────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddModal() {
  editingAccount = null;
  document.getElementById('modal-title').textContent = 'Agregar cuenta';
  document.getElementById('modal-save-btn').textContent = 'Agregar';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-tier').value = 'Master';
  document.getElementById('modal-name').disabled = false;
  openModal('acc-modal');
  setTimeout(()=>document.getElementById('modal-name').focus(), 100);
}

function openEditModal(name) {
  const acc = accounts.find(a => a.name === name);
  if (!acc) return;
  editingAccount = name;
  document.getElementById('modal-title').textContent = 'Editar cuenta';
  document.getElementById('modal-save-btn').textContent = 'Guardar';
  document.getElementById('modal-name').value = acc.name;
  document.getElementById('modal-name').disabled = true;
  document.getElementById('modal-tier').value = acc.tier;
  openModal('acc-modal');
}

async function saveAccount() {
  const name = document.getElementById('modal-name').value.trim();
  const tier = document.getElementById('modal-tier').value;
  if (!name) return;

  setSyncStatus('loading', 'Guardando...');
  try {
    if (editingAccount) {
      await fetch(`${SUPABASE_URL}/rest/v1/${ATABLE}?name=eq.${encodeURIComponent(editingAccount)}`, {
        method: 'PATCH', headers: H, body: JSON.stringify({tier})
      });
      const acc = accounts.find(a => a.name === editingAccount);
      if (acc) acc.tier = tier;
    } else {
      const maxOrder = accounts.length ? Math.max(...accounts.map((_,i)=>i+1)) + 1 : 1;
      await apiUpsert(ATABLE, {name, tier, sort_order: maxOrder});
      accounts.push({name, tier});
    }
    closeModal('acc-modal');
    setSyncStatus('ok', 'Guardado · ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncStatus('err', 'Error: ' + e.message);
  }
}

function openDeleteModal(name) {
  deletingAccount = name;
  document.getElementById('delete-title').textContent = `¿Eliminar "${name}"?`;
  document.getElementById('delete-msg').textContent = `Se van a borrar todos los datos de ${name}. Esta acción no se puede deshacer.`;
  openModal('delete-modal');
}

async function confirmDelete() {
  if (!deletingAccount) return;
  setSyncStatus('loading', 'Eliminando...');
  try {
    await apiDelete(ATABLE, `name=eq.${encodeURIComponent(deletingAccount)}`);
    await apiDelete(VTABLE, `account=eq.${encodeURIComponent(deletingAccount)}`);
    accounts = accounts.filter(a => a.name !== deletingAccount);
    delete videoData[deletingAccount];
    deletingAccount = null;
    closeModal('delete-modal');
    setSyncStatus('ok', 'Eliminado · ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncStatus('err', 'Error al eliminar');
  }
}

function openResetModal() { openModal('reset-modal'); }

async function confirmReset() {
  setSyncStatus('loading', 'Reseteando ciclo...');
  try {
    for (const acc of accounts) {
      await apiUpsert(VTABLE, {account: acc.name, count: 0});
      videoData[acc.name] = 0;
    }
    closeModal('reset-modal');
    setSyncStatus('ok', 'Ciclo reseteado · ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncStatus('err', 'Error al resetear');
  }
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

init();
</script>
</body>
</html>
